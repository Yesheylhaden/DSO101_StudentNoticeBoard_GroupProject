name: Student Noticeboard CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME_BACKEND: ${{ secrets.DOCKER_USERNAME }}/student-noticeboard-backend
  IMAGE_NAME_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/student-noticeboard-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # STAGE 1: CODE QUALITY & LINTING
  # ─────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pylint

      - name: Run Flake8 linter
        working-directory: ./backend
        run: flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check code formatting with Black
        working-directory: ./backend
        run: black --check app.py || true

  # ─────────────────────────────────────────────────────────────
  # STAGE 2: UNIT TESTS
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: noticeboard_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: noticeboard_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          FLASK_ENV: testing
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html || true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # STAGE 3: BUILD DOCKER IMAGES
  # ─────────────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: unit-tests

    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ─── BUILD BACKEND IMAGE ───
      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/student-noticeboard-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:buildcache,mode=max

      # ─── BUILD FRONTEND IMAGE ───
      - name: Create Dockerfile for frontend
        run: |
          cat > ./frontend/Dockerfile << 'EOF'
          FROM nginx:alpine
          COPY . /usr/share/nginx/html/
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:buildcache,mode=max

  # ─────────────────────────────────────────────────────────────
  # STAGE 4: SECURITY CHECKS
  # ─────────────────────────────────────────────────────────────
  security-check:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: build-images

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check for hardcoded credentials
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          if grep -rn "password\s*=\s*['\"][^'\"]" --include="*.py" backend/; then
            echo "❌ Hardcoded passwords found!"
            exit 1
          fi
          echo "✅ No hardcoded credentials found"

      - name: Verify non-root user in backend Dockerfile
        run: |
          echo "🔍 Checking Dockerfile for non-root user..."
          if grep -q "^USER " backend/Dockerfile; then
            echo "✅ Non-root user configured"
          else
            echo "❌ No USER instruction found in Dockerfile — container runs as root!"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # STAGE 5: DOCKER COMPOSE INTEGRATION TEST
  # ─────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Test with Docker Compose
    runs-on: ubuntu-latest
    needs: security-check
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fix port mapping in docker-compose.yml
        run: sed -i 's/"5001:5000"/"5001:5001"/' docker-compose.yml

      - name: Start Docker Compose stack
        run: docker compose up -d --build

      - name: Wait for backend to be ready
        run: |
          echo "⏳ Waiting for backend to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:5001/health > /dev/null 2>&1; then
              echo "✅ Backend is ready!"
              exit 0
            fi
            echo "⏳ Attempt $i/30 - retrying in 3s..."
            sleep 3
          done
          echo "❌ Backend failed to start after 90s"
          docker compose logs backend
          exit 1

      - name: Test API health endpoint
        run: |
          curl -sf http://localhost:5001/health
          echo "✅ Health check passed"

      - name: Test API GET /announcements
        run: |
          curl -sf http://localhost:5001/announcements
          echo "✅ GET announcements passed"

      - name: Test API POST /announcements
        run: |
          curl -sf -X POST http://localhost:5001/announcements \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Test Notice",
              "body": "Integration test notice",
              "category": "general",
              "author": "CI/CD Pipeline"
            }'
          echo "✅ POST announcement passed"

      - name: View logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v