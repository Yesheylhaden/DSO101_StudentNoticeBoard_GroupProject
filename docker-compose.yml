version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: todo_db_2
      POSTGRES_USER: todo_db_2_user
      POSTGRES_PASSWORD: 69p7iMB52e3Q0kLkfl7zRMBUcmzgay8i
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U todo_db_2_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    environment:
      DB_HOST: db # ⭐ IMPORTANT: Use 'db' (service name), NOT localhost
      DB_PORT: 5432
      DB_NAME: todo_db_2
      DB_USER: todo_db_2_user
      DB_PASSWORD: 69p7iMB52e3Q0kLkfl7zRMBUcmzgay8i
      FLASK_ENV: production
      FLASK_DEBUG: False
    depends_on:
      db:
        condition: service_healthy
    command: python app.py

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  postgres_data:
